<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Maten TV LG</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        #webviewFrame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #lgPlayerContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsdBBTuCA0cQL8QtJkSPYy8N_Dmr3K_bI",
            authDomain: "maten-tv.firebaseapp.com",
            projectId: "maten-tv",
            storageBucket: "maten-tv.firebasestorage.app",
            messagingSenderId: "196479152493",
            appId: "1:196479152493:web:82860b7f878a47b731ea64",
            measurementId: "G-0BB5EY6TNW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // ئەوەتا قوفڵە ترسناکەکەت لێرەدا دانرا!
        let secretUserAgent = "MatenTV_VIP_Secret_2026_Gold_X9fQ2m4vL8pZ1wE7cR0tY3uI6oA5sD8fGhjKlkMzNxBvCqWwE_HACKER_GO_TO_SLEEP_ERROR_404_BRAIN_NOT_FOUND_SYSTEM_OVERLOAD_WARNING_DO_NOT_COPY_THIS_IT_WILL_DESTROY_YOUR_PC_999999999999999999999_SUPER_LONG_STRING_MAFIA_BOSS_NECHIRVAN_IS_WATCHING_YOU_ABORT_MISSION_IMMEDIATELY_Z9yX8wV7uT6sR5qP4oN3mL2kI1jH0gG_FhDfSDFGdfgSDFGsdfgSDFGsdfgSDFG_STOP_TRYING_TO_STEAL_MY_LINKS_BRO_YOU_ARE_WASTING_YOUR_TIME_1234567890qwertyuiopasdfghjklzxcvbnm_THIS_IS_THE_END_BUT_WAIT_THERE_IS_MORE_JUST_TO_MAKE_YOU_CRY_END_OF_LINE";
        
        let lgHlsPlayer = null;

        async function fetchSecret() {
            try {
                const docRef = doc(db, "settings", "adConfig");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().secretUserAgent) {
                    secretUserAgent = docSnap.data().secretUserAgent;
                    console.log("Secret loaded from Firebase.");
                }
            } catch (e) {
                console.error("Firebase Error:", e);
            }
        }
        fetchSecret();

        const lgPlayerContainer = document.getElementById('lgPlayerContainer');
        const lgVideo = document.getElementById('lgVideo');

        window.MatenApp = {
            playVideoWithBuffer: function(url, title, isHeavyBuffer) {
                lgPlayerContainer.style.display = 'block';

                if (lgHlsPlayer) {
                    lgHlsPlayer.destroy();
                }

                let finalUrl = url;
                if (url.includes('proxy.php') || url.includes('workers.dev')) {
                    finalUrl += (url.includes('?') ? '&' : '?') + 'secret=' + secretUserAgent;
                }

                if (Hls.isSupported()) {
                    lgHlsPlayer = new Hls({
                        maxBufferLength: isHeavyBuffer ? 50 : 15,
                        maxMaxBufferLength: isHeavyBuffer ? 60 : 20
                    });
                    lgHlsPlayer.loadSource(finalUrl);
                    lgHlsPlayer.attachMedia(lgVideo);
                    lgHlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                        lgVideo.play();
                    });
                } else if (lgVideo.canPlayType('application/vnd.apple.mpegurl')) {
                    lgVideo.src = finalUrl;
                    lgVideo.play();
                }
            },

            stopVideo: function() {
                lgVideo.pause();
                if (lgHlsPlayer) {
                    lgHlsPlayer.destroy();
                    lgHlsPlayer = null;
                }
                lgPlayerContainer.style.display = 'none';
            },

            toggleNativeFullscreen: function() {
            },

            androidGoBack: function() {
                if (lgPlayerContainer.style.display === 'block') {
                    window.MatenApp.stopVideo();
                }
            }
        };

        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 461 || event.key === "Backspace") { 
                if (lgPlayerContainer.style.display === 'block') {
                    event.preventDefault();
                    window.MatenApp.stopVideo();
                }
            }
        });

    </script>
</head>
<body>
    <iframe id="webviewFrame" src="https://maten-tv.win"></iframe>
    <div id="lgPlayerContainer">
        <video id="lgVideo" controls></video>
    </div>
</body>
</html>
