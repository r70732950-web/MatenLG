name: Build LG webOS App (IPK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install webOS CLI
        run: npm install -g @webosose/ares-cli

      - name: Build IPK
        run: ares-package .

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: MatenTV-LG-IPK
          path: "*.ipk"
